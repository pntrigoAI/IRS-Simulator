<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de IRS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="max-w-lg mx-auto mt-10 p-5 bg-white rounded shadow">
        <h1 class="text-2xl font-bold mb-5 text-center">Simulador de IRS</h1>
        <form id="irsForm" class="space-y-4">
            <div>
                <label for="income" class="block mb-2">Rendimento Bruto (€):</label>
                <input type="number" id="income" name="income" class="w-full p-2 border rounded" required>
            </div>
            <div>
                <label for="dependents" class="block mb-2">Número de Dependentes:</label>
                <input type="number" id="dependents" name="dependents" class="w-full p-2 border rounded" required>
            </div>
            <div>
                <label for="expenses" class="block mb-2">Despesas (€):</label>
                <input type="number" id="expenses" name="expenses" class="w-full p-2 border rounded" required>
            </div>
            <button type="submit" class="w-full bg-blue-500 text-white font-bold py-2 rounded hover:bg-blue-600">Calcular</button>
        </form>
        <div id="result" class="mt-5 text-center text-lg font-semibold"></div>
        <canvas id="chart" class="mt-5 w-full h-64"></canvas>
    </div>
    <script src="app.js"></script>
</body>
</html>
